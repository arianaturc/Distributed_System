<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Distributed Movie System</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161922;
      --panel-2: #1c2030;
      --ink: #e8ecf3;
      --ink-dim: #8b94a8;
      --line: #262b3c;
      --accent: #ffa726;
      --ok: #6ee7a0;
      --warn: #ffb454;
      --bad: #ff6b6b;
      --hammer: #c0392b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }

    /* Header */
    header {
      padding: 26px 48px 18px;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    header h1 {
      margin: 0; font-size: 26px; font-weight: 700; letter-spacing: .2px;
    }
    header h1 .accent { color: var(--accent); }
    header .sub { color: var(--ink-dim); font-size: 13px; margin-top: 4px; }

    .cb-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
    }
    .cb-pill .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--ok); box-shadow: 0 0 6px var(--ok);
    }
    .cb-pill.OPEN .dot      { background: var(--bad);  box-shadow: 0 0 6px var(--bad); }
    .cb-pill.HALF_OPEN .dot { background: var(--warn); box-shadow: 0 0 6px var(--warn); }
    .cb-pill .label { color: var(--ink-dim); }
    .cb-pill .state { font-weight: 700; letter-spacing: .6px; }

    hr.div {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 6px 48px 24px;
    }

    .actions {
      margin: 0 48px 22px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      display: flex; flex-wrap: wrap; gap: 10px;
    }
    .actions button {
      background: var(--panel-2);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: border-color .15s, background .15s, color .15s;
    }
    .actions button:hover { border-color: var(--accent); }
    .actions button.primary {
      background: var(--accent); color: #221705; border-color: var(--accent);
      font-weight: 700;
    }
    .actions button.danger {
      color: #ff8a80; border-color: rgba(255,107,107,.35); background: rgba(192,57,43,.18);
    }
    .actions button.danger:hover { border-color: var(--bad); }

    .log-wrap { margin: 0 48px; }
    .log-wrap .label {
      color: var(--ink-dim); font-size: 11px;
      letter-spacing: 1.6px; text-transform: uppercase;
      margin-bottom: 8px;
    }
    .log {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px 22px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px;
      height: calc(100vh - 280px);
      min-height: 480px;
      overflow-y: auto;
    }
    .log .row { padding: 3px 0; line-height: 1.55; }
    .log .ts  { color: var(--ink-dim); margin-right: 10px; }
    .log .ok    { color: var(--ok); }
    .log .warn  { color: var(--warn); }
    .log .bad   { color: var(--bad); }
    .log .info  { color: var(--ink); }
    .log .badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 1px 7px; border-radius: 4px; margin-right: 6px; letter-spacing: .5px;
    }
    .log .badge.live { background: rgba(110,231,160,.15); color: var(--ok); }
    .log .badge.fb   { background: rgba(255,180,84,.15); color: var(--warn); }
    .log .badge.err  { background: rgba(255,107,107,.15); color: var(--bad); }

    .movie-row {
      display: flex; gap: 12px; align-items: baseline;
      padding: 6px 0; border-bottom: 1px dashed var(--line);
    }
    .movie-row:last-child { border-bottom: 0; }
    .movie-row .id { color: var(--ink-dim); font-size: 12px; min-width: 32px; }
    .movie-row .title { color: var(--ink); font-weight: 600; min-width: 180px; }
    .movie-row .desc { color: var(--ink-dim); font-size: 12px; }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Distributed <span class="accent">Movie</span> System</h1>
    <div class="sub">API Gateway → Movie Service → Recommendation Service</div>
  </div>
  <div class="cb-pill CLOSED" id="cb-pill">
    <span class="dot"></span>
    <span class="label">Circuit:</span>
    <span class="state" id="cb-state">CLOSED</span>
  </div>
</header>
<hr class="div">

<div class="actions">
  <button class="primary" onclick="loadAll()">Load all movies</button>
  <button onclick="loadMovie(1)">Movie 1</button>
  <button onclick="loadMovie(2)">Movie 2</button>
  <button onclick="loadMovie(3)">Movie 3</button>
  <button onclick="loadMovie(4)">Movie 4</button>
  <button onclick="loadMovie(5)">Movie 5</button>
  <button onclick="loadMovie(6)">Movie 6</button>
  <button class="danger" onclick="hammer()">Hammer (trip the breaker)</button>
  <button onclick="pollCircuit(true)">Refresh circuit</button>
</div>

<div class="log-wrap">
  <div class="label">Activity log</div>
  <div class="log" id="log"></div>
</div>

<script>
  const logEl = document.getElementById('log');

  function ts() {
    const d = new Date();
    return d.toLocaleTimeString('en-US', { hour12: true });
  }

  function logLine(html, level = 'info') {
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `<span class="ts">${ts()}</span><span class="${level}">${html}</span>`;
    logEl.appendChild(row);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function logHTML(html) {
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `<span class="ts">${ts()}</span>${html}`;
    logEl.appendChild(row);
    logEl.scrollTop = logEl.scrollHeight;
  }

  logLine('UI ready. Try <b>"Load all movies"</b> or <b>"Hammer"</b> while chaos is on.');

  async function loadMovie(id) {
    const t0 = performance.now();
    try {
      const res = await fetch(`/api/movies/${id}`);
      const data = await res.json();
      const elapsed = Math.round(performance.now() - t0);

      if (!res.ok || !data.movie) {
        logLine(`Movie ${id}: <span class="bad">error — ${data.error || res.status}</span>`, 'info');
        return;
      }

      const badge = data.degraded
              ? `<span class="badge fb">FALLBACK · ${data.reason}</span>`
              : `<span class="badge live">LIVE</span>`;

      logHTML(`${badge}<b>${data.movie.title}</b> — ${data.recommendations.length} recommendation(s) in ${elapsed} ms`);

      for (const r of data.recommendations) {
        logHTML(`<div class="movie-row"><span class="id">#${r.id}</span><span class="title">${r.title}</span><span class="desc">${r.description}</span></div>`);
      }
    } catch (e) {
      logLine(`Movie ${id}: <span class="bad">gateway unreachable</span>`, 'info');
    }
  }

  async function loadAll() {
    logLine('Loading all 6 movies…', 'info');
    for (let id = 1; id <= 6; id++) {
      await loadMovie(id);
    }
    pollCircuit();
  }


  async function hammer() {
    logLine('Hammering Service B with 20 rapid calls…', 'warn');
    const calls = [];
    for (let i = 0; i < 20; i++) {
      calls.push(fetch(`/api/movies/${(i % 6) + 1}`).then(r => r.json()).catch(() => null));
    }
    const results = await Promise.all(calls);
    const live = results.filter(r => r && !r.degraded).length;
    const fb   = results.filter(r => r && r.degraded).length;
    logLine(`Hammer done: <span class="ok">${live} live</span> / <span class="warn">${fb} fallback</span>`, 'info');
    pollCircuit(true);
  }

  async function pollCircuit(verbose = false) {
    try {
      const res = await fetch('/api/circuit');
      if (!res.ok) return;
      const c = await res.json();
      const pill = document.getElementById('cb-pill');
      pill.className = 'cb-pill ' + c.state;
      document.getElementById('cb-state').textContent = c.state;
      if (verbose) {
        const level = c.state === 'OPEN' ? 'bad' : (c.state === 'HALF_OPEN' ? 'warn' : 'ok');
        logLine(`Circuit: <b>${c.state}</b> — failure ${c.failureRate < 0 ? 'n/a' : c.failureRate.toFixed(1) + '%'}, slow ${c.slowCallRate < 0 ? 'n/a' : c.slowCallRate.toFixed(1) + '%'}, rejected ${c.notPermittedCalls}`, level);
      }
    } catch (e) { /* ignore */ }
  }

  let lastState = 'CLOSED';
  async function watchCircuit() {
    try {
      const res = await fetch('/api/circuit');
      if (!res.ok) return;
      const c = await res.json();
      if (c.state !== lastState) {
        const level = c.state === 'OPEN' ? 'bad' : (c.state === 'HALF_OPEN' ? 'warn' : 'ok');
        logLine(`Circuit state changed: <b>${lastState} → ${c.state}</b>`, level);
        lastState = c.state;
      }
      const pill = document.getElementById('cb-pill');
      pill.className = 'cb-pill ' + c.state;
      document.getElementById('cb-state').textContent = c.state;
    } catch (e) { /* ignore */ }
  }

  watchCircuit();
  setInterval(watchCircuit, 1500);
</script>
</body>
</html>
